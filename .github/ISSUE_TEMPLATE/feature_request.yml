---
name: Feature Request
description: Suggest a new feature or enhancement
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide as much detail as possible.

  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: A clear and concise description of the feature you'd like to see
    validations:
      required: true

  - type: textarea
    id: problem-statement
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How would you like this feature to work?
    validations:
      required: true

  - type: textarea
    id: terraform-example
    attributes:
      label: Terraform Example
      description: Show how you would like to use this feature
      render: hcl
      placeholder: |
        resource "rustfs_example" "test" {
          name = "example"
          # ...
        }
    validations:
      required: false

  - type: dropdown
    id: feature-type
    attributes:
      label: Feature Type
      options:
        - New Resource
        - New Data Source
        - Enhancement to Existing Resource
        - Provider Configuration
        - Documentation Improvement
        - Other
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical - Blocking my adoption
        - High - Significant impact on workflow
        - Medium - Nice to have
        - Low - Minor improvement
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any additional information or references
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I have searched existing issues for similar requests
          required: true
        - label: I have checked that this feature is not already implemented
          required: true
