name: Terraform Provider CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  checkup:
    name: Checkup
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"
      - name: Run fmt
        run: go fmt ./...
      - name: Run vet
        run: go vet ./...
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...
      - name: Build test environment
        run: |
          docker compose -f acc_test/docker-compose.yml build
          docker compose -f acc_test/docker-compose.yml up -d
      - name: Wait for RustFS to be ready
        run: |
          echo "Waiting for RustFS..."
          timeout 120 bash -c 'until curl -sf http://localhost:9001/rustfs/admin/v3/is-admin >/dev/null 2>&1; do sleep 2; done'
          echo "RustFS is ready!"
      - name: Run acceptance tests
        run: docker compose -f acc_test/docker-compose.yml run --rm test
      - name: Cleanup
        if: always()
        run: docker compose -f acc_test/docker-compose.yml down -v
