name: Terraform Provider CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"
      - name: Run fmt
        run: go fmt ./...
      - name: Run vet
        run: go vet ./...
      - name: Run Gosec Security Scanner
        uses: securego/gosec@master
        with:
          args: ./...

  test:
    name: Acceptance Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30
    env:
      GOARCH: amd64
      GOOS: linux
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version-file: "go.mod"
      - name: Build test environment
        run: |
          docker compose -f acc_test/docker-compose.yml build
          docker compose -f acc_test/docker-compose.yml up -d --wait rustfs
      - name: Run acceptance tests
        run: docker compose -f acc_test/docker-compose.yml --profile test run --rm test
      - name: Cleanup
        if: always()
        run: docker compose -f acc_test/docker-compose.yml down -v
